name: QwenPaw Platform Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: qwenpaw-platform-watchdog
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check required secrets
        env:
          STORAGE_STATE_B64: ${{ secrets.STORAGE_STATE_B64 }}
          PLATFORM_URL: ${{ secrets.PLATFORM_URL }}
        run: |
          if [ -z "$STORAGE_STATE_B64" ]; then
            echo "::error::缺少 GitHub Secret：STORAGE_STATE_B64。请把 auth.json 的 Base64 单行内容保存到该 Secret。"
            exit 1
          fi
          if [ -z "$PLATFORM_URL" ]; then
            echo "::error::缺少 GitHub Secret：PLATFORM_URL。请填写平台部署页面完整地址。"
            exit 1
          fi

      - name: Restore login state
        env:
          STORAGE_STATE_B64: ${{ secrets.STORAGE_STATE_B64 }}
        run: |
          printf '%s' "$STORAGE_STATE_B64" | base64 --decode > auth.json
          test -s auth.json || { echo "::error::auth.json 解码后为空"; exit 1; }
          node -e "JSON.parse(require('fs').readFileSync('auth.json', 'utf8')); console.log('登录状态文件有效')"

      - name: Check platform, start it, open QwenPaw and run command
        id: monitor
        env:
          PLATFORM_URL: ${{ secrets.PLATFORM_URL }}
          WAKEUP_COMMAND: /opt/komari/wakeup.sh
          HEADLESS: "true"
        run: npm run check

      - name: Upload login, running-status and command screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwenpaw-screenshots-${{ github.run_number }}
          path: artifacts/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Send Telegram bot notification with screenshots
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "未配置 TELEGRAM_BOT_TOKEN 或 TELEGRAM_CHAT_ID，跳过机器人通知。"
            exit 0
          fi

          RUN_URL="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          MESSAGE="QwenPaw 巡检结果: $JOB_STATUS
仓库: $REPOSITORY
运行编号: $RUN_NUMBER
详情: $RUN_URL"

          curl --fail --silent --show-error \
            --request POST \
            --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=$MESSAGE" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"

          shopt -s nullglob
          screenshots=(artifacts/*.png)
          for image in "${screenshots[@]}"; do
            filename="$(basename "$image")"
            curl --fail --silent --show-error \
              --request POST \
              --form "chat_id=$TELEGRAM_CHAT_ID" \
              --form "caption=QwenPaw 截图: $filename" \
              --form "photo=@$image" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto"
          done

      - name: Keep only the current workflow run record
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          WORKFLOW_FILE: watchdog.yml
        run: |
          echo "删除此工作流以前的运行记录，仅保留当前记录 $CURRENT_RUN_ID"
          page=1
          while :; do
            result="$(curl --fail --silent --show-error \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs?per_page=100&page=$page")"

            ids="$(printf '%s' "$result" | jq -r --arg current "$CURRENT_RUN_ID" '.workflow_runs[] | select((.id | tostring) != $current) | .id')"
            count="$(printf '%s' "$result" | jq '.workflow_runs | length')"

            for id in $ids; do
              echo "删除旧运行记录: $id"
              curl --fail --silent --show-error \
                --request DELETE \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPOSITORY/actions/runs/$id"
            done

            [ "$count" -lt 100 ] && break
            page=$((page + 1))
          done
